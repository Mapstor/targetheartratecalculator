<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Heart Icon -->
  <g transform="translate(550, 80)">
    <path d="M50,25 C35,5 0,15 0,45 C0,75 50,110 50,110 C50,110 100,75 100,45 C100,15 65,5 50,25"
          fill="white" opacity="0.9"/>
  </g>

  <!-- Heartbeat Line -->
  <path d="M100,400 L350,400 L380,400 L420,350 L450,450 L480,300 L510,500 L540,380 L570,420 L600,400 L850,400 L1100,400"
        stroke="white" stroke-width="4" fill="none" opacity="0.3"/>

  <!-- Main Text -->
  <text x="600" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">Target Heart Rate</text>
  <text x="600" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">Calculator</text>

  <!-- Subtitle -->
  <text x="600" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="white" text-anchor="middle" opacity="0.9">Calculate your optimal training zones</text>

  <!-- Zone Indicators at bottom -->
  <g transform="translate(200, 520)">
    <rect x="0" y="0" width="140" height="40" rx="8" fill="#22c55e" opacity="0.9"/>
    <text x="70" y="27" font-family="system-ui, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">WARM UP</text>
  </g>
  <g transform="translate(160, 520)">
    <rect x="0" y="0" width="140" height="40" rx="8" fill="#84cc16" opacity="0.9"/>
    <text x="70" y="27" font-family="system-ui, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">FAT BURN</text>
  </g>
  <g transform="translate(320, 520)">
    <rect x="0" y="0" width="140" height="40" rx="8" fill="#eab308" opacity="0.9"/>
    <text x="70" y="27" font-family="system-ui, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">CARDIO</text>
  </g>
  <g transform="translate(480, 520)">
    <rect x="0" y="0" width="140" height="40" rx="8" fill="#f97316" opacity="0.9"/>
    <text x="70" y="27" font-family="system-ui, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">HARD</text>
  </g>
  <g transform="translate(640, 520)">
    <rect x="0" y="0" width="140" height="40" rx="8" fill="#ef4444" opacity="0.9"/>
    <text x="70" y="27" font-family="system-ui, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">PEAK</text>
  </g>

  <!-- Website URL -->
  <text x="600" y="600" font-family="system-ui, sans-serif" font-size="20" fill="white" text-anchor="middle" opacity="0.7">targetheartratecalculator.org</text>
</svg>
